name: transform
profile: transform

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
docs-paths: ["docs"]


clean-targets: [target, logs, .user.yml]

models:
  transform:          
    +materialized: table
    bronze:
      +schema: bronze    
    staging:
      +schema: staging
      +views_enabled: false
    silver:
      +materialized: incremental
      +views_enabled: false
      +schema: silver
      +enabled: true
      +tags: ["silver", "cleansed_data"]
    intermediate:
      +schema: intermediate
      +materialized: table
      +enabled: true
      +tags: ["intermediate", "cleansed_data"]
    gold:
      +schema: gold
      +materialized: table
      +enabled: true

  elementary:
    +schema: elementary
    +views_enabled: false
    edr:
      run_results:
        model_run_results:
          +materialized: table
        snapshot_run_results:
          +materialized: table
        seed_run_results:
          +materialized: table
        job_run_results:
          +materialized: table
        alert_schema_changes:
          +materialized: table
      
      alerts:
        alerts_dbt_models:
          +materialized: table
        alerts_dbt_tests:
          +materialized: table
        alerts_anomaly_detection:
          +materialized: table
        alerts_dbt_source_freshness:
          +materialized: table
        alerts_schema_changes:
          +materialized: table

      data_monitoring:
        anomaly_detection:
          +materialized: table
      system:
        monitors_runs:
          +materialized: table
      dbt_artifacts:
        dbt_artifacts_hashes:
          +materialized: table

seeds:
  +schema: seeds

snapshots:
  +schema: snapshots

data_tests:
  transform:
    +store_failures: true
    +limit: 1000
    +schema: test_results
    +database: ops_db
    
    

flags:
  +require_certificate_validation: True
vars:
  'dbt_date:time_zone': 'Asia/Ho_Chi_Minh'
  elementary:
    training_period: # the period which is used to train the data quality model
      period: day
      count: 45
    test_sample_row_count: 4 # number of failed test rows, which are stored in the table test_result_rows
    detection_period: # the period which is used to detect data quality issues
      period: day
      count: 10
    exclude_detection_period_from_training: true # exclude the detection period from training data, preventing from overlapping data quality issues with training data
    detection_delay: 
      period: day 
      count: 1

query-comment:
  comment: >-
    {"app": "dbt", "env": "{{ target.name }}", "user": "{{ target.user }}", "node_id": "{{ node.unique_id }}", "run_id": "{{ invocation_id }}"}
  append: true
