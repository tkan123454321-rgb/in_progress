models:
  - name: silver_dim_company
    description: "dim_company's silver layer, applying data quality tests, de-duplications and transformations to prepare the data for analytics and reporting. It ensures that the data is clean, consistent, and ready for use in the business intelligence layer."
    columns:
      - name: company_sk
        data_type: varchar
        description: "surrogate key for tickers, generated by hashing the ticker by MD5"
        data_tests:
          - unique   
          - not_null

      - name: ticker
        data_type: varchar
        description: "ticker symbol of the company, e.g. VIC, FPT, etc."
        data_tests:
          - unique
          - not_null
          - relationships: # Kiểm tra xem ticker này có tồn tại trong bảng gốc không
              to: ref('raw_dim_company')
              field: ticker

      - name: company_name
        data_type: varchar
        description: "name of the company"
        data_tests:
          - not_null
      

      - name: industry_group
        data_type: varchar
        description: "industry group of the company, e.g. Technology, Financials, etc."
        data_tests:
          - not_null

      - name: sector_detail
        data_type: varchar
        description: "sector detail of the company, e.g. Software, Hardware, etc."
        data_tests:
          - not_null

      - name: ingested_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was ingested into the staging layer"
        data_tests:
          - not_null

      - name: staged_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was staged in the silver layer"
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              datepart: day
              interval: 32

      - name: dbt_updated_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was last updated in the silver layer"
        data_tests:
          - not_null
           
      - name: dbt_silver_invocation_id
        data_type: varchar
        description: "unique identifier for the silver layer invocation, used for debugging processes"
        data_tests:
          - not_null

