x-airflow-common: &airflow-common
  image: apache/airflow:3.1.7
  env_file:
    - .env
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - monitoring_net
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: api-server
    ports:
      - "8081:8080" # Đổi sang 8081 để tránh đụng port Trino/Spark
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    depends_on:
      <<: *airflow-common-depends-on
    entrypoint: /bin/bash
    user: root
    command:
      - -c
      - |
        if [[ -z "${AIRFLOW_UID}" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: AIRFLOW_UID not set!\e[0m"
          echo "If you are on Linux, you SHOULD follow the instructions below to set "
          echo "AIRFLOW_UID environment variable, otherwise files will be owned by root."
          echo "For other operating systems you can get rid of the warning with manually created .env file:"
          echo "    See: https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#setting-the-right-airflow-user"
          echo
          export AIRFLOW_UID=$$(id -u)
        fi
        one_meg=1048576
        mem_available=$$(($$(getconf _PHYS_PAGES) * $$(getconf PAGE_SIZE) / one_meg))
        cpus_available=$$(grep -cE 'cpu[0-9]+' /proc/stat)
        disk_available=$$(df / | tail -1 | awk '{print $$4}')
        warning_resources="false"
        if (( mem_available < 4000 )) ; then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough memory available for Docker.\e[0m"
          echo "At least 4GB of memory required. You have $$(numfmt --to iec $$((mem_available * one_meg)))"
          echo
          warning_resources="true"
        fi
        if (( cpus_available < 2 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough CPUS available for Docker.\e[0m"
          echo "At least 2 CPUs recommended. You have $${cpus_available}"
          echo
          warning_resources="true"
        fi
        if (( disk_available < one_meg * 10 )); then
          echo
          echo -e "\033[1;33mWARNING!!!: Not enough Disk space available for Docker.\e[0m"
          echo "At least 10 GBs recommended. You have $$(numfmt --to iec $$((disk_available * 1024 )))"
          echo
          warning_resources="true"
        fi
        if [[ $${warning_resources} == "true" ]]; then
          echo
          echo -e "\033[1;33mWARNING!!!: You have not enough resources to run Airflow (see above)!\e[0m"
          echo "Please follow the instructions to increase amount of resources available:"
          echo "   https://airflow.apache.org/docs/apache-airflow/stable/howto/docker-compose/index.html#before-you-begin"
          echo
        fi
        echo
        echo "Creating missing opt dirs if missing:"
        echo
        mkdir -v -p /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Airflow version:"
        /entrypoint airflow version
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Running airflow config list to create default config file if missing."
        echo
        /entrypoint airflow config list >/dev/null
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Change ownership of files in /opt/airflow to ${AIRFLOW_UID}:0"
        echo
        chown -R "${AIRFLOW_UID}:0" /opt/airflow/
        echo
        echo "Change ownership of files in shared volumes to ${AIRFLOW_UID}:0"
        echo
        chown -v -R "${AIRFLOW_UID}:0" /opt/airflow/{logs,dags,plugins,config}
        echo
        echo "Files in shared volumes:"
        echo
        ls -la /opt/airflow/{logs,dags,plugins,config}

  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    command: [ "postgres", "-c", "shared_preload_libraries=pg_partman_bgw" ]
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./postgres_database/init_postgres_db:/docker-entrypoint-initdb.d
    networks:
      - monitoring_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      retries: 5
      start_period: 5s
    mem_limit: 512m

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9997:9997"
    env_file:
      - .env
    networks:
      - monitoring_net

    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9092 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    mem_limit: 2048m
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafbat-ui:
    container_name: kafbat-ui
    image: ghcr.io/kafbat/kafka-ui:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      - monitoring_net
    volumes:
      - ./config/config_docker/ui_kafba.yaml:/etc/kafkaui/dynamic_config.yaml
    depends_on:
      - kafka

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - monitoring_net
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/config_docker/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - plugins-trino:/var/lib/grafana/plugins/trino
  loki:
    image: grafana/loki:latest
    container_name: loki
    networks:
      - monitoring_net
    ports:
      - "3100:3100"
    restart: unless-stopped
    env_file:
      - .env
    command: -config.file=/etc/loki/local-config.yaml -config.expand-env=true
    volumes:
      - ./config/config_docker/loki_config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    depends_on:
      create-buckets:
        condition: service_completed_successfully

  minio:
    image: quay.io/minio/aistor/minio:latest
    container_name: aistor-server
    networks:
      - monitoring_net
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    volumes:
      - ./minio.license:/minio.license
      - minio_data:/mnt/data
    command: server /mnt/data --console-address ":9001" --license /minio.license

  create-buckets:
    image: minio/mc:latest
    restart: on-failure
    networks:
      - monitoring_net
    env_file:
      - .env
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " echo 'Đang chờ MinIO khởi động...';  until (/usr/bin/mc alias set myminio http://minio:9000 $${MINIO_USER} $${MINIO_PASSWORD});  do
        sleep 1;
      done;   /usr/bin/mc mb --ignore-existing myminio/loki-data;   /usr/bin/mc mb --ignore-existing myminio/loki-ruler;   echo 'hoàn thành tạo bucket';   exit 0; "

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    ports:
      - "9080:9080"
    networks:
      - monitoring_net
    volumes:
      - ./config/config_docker/promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - promtail_data:/tmp
    command: -config.file=/etc/promtail/config.yaml -config.expand-env=true

  dev-container:
    build: .
    container_name: dev-container
    command: [ "sleep", "infinity" ]
    volumes:
      - ./:/app
    env_file:
      - .env
    networks:
      - monitoring_net

  # jupyter:
  #   build: .
  #   container_name: jupyter-lab
  #   command: >
  #     jupyter lab --ServerApp.ip=0.0.0.0 --ServerApp.port=8888 --ServerApp.root_dir=/app --ServerApp.open_browser=False --ServerApp.allow_root=True  --ServerApp.token=''  --PasswordIdentityProvider.password_required=False --ZMQChannelsWebsocketConnection.iopub_data_rate_limit=10000000000 --ServerApp.allow_origin='*' --ServerApp.disable_check_xsrf=True
  #   volumes:
  #     - .:/app
  #   ports:
  #     - "8888:8888"
  #   networks:
  #     - monitoring_net

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: nessie
    user: root
    ports:
      - "19120:19120"
    restart: unless-stopped
    environment:
      - NESSIE_VERSION_STORE_TYPE=JDBC
      - NESSIE_VERSION_STORE_PERSIST_JDBC_DATASOURCE=postgresql
      - NESSIE_VERSION_STORE_PERSIST_JDBC_SCHEMA=nessie
      - QUARKUS_DATASOURCE_POSTGRESQL_JDBC_URL=jdbc:postgresql://postgres:5432/platform_db?currentSchema=nessie
      - QUARKUS_DATASOURCE_POSTGRESQL_USERNAME=${POSTGRES_USER}
      - QUARKUS_DATASOURCE_POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}

      - NESSIE_CATALOG_DEFAULT_WAREHOUSE=miniolakehouse
      - NESSIE_CATALOG_WAREHOUSES_MINIOLAKEHOUSE_LOCATION=s3://financial-data-lake/

      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT=http://minio:9000
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS=true
      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION=us-east-1

      - NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ACCESS_KEY=urn:nessie-secret:quarkus:nessie.catalog.secrets.access-key
      - NESSIE_CATALOG_SECRETS_ACCESS_KEY_NAME=${POSTGRES_USER}
      - NESSIE_CATALOG_SECRETS_ACCESS_KEY_SECRET=${POSTGRES_PASSWORD}
    volumes:
      - nessie_data:/var/lib/nessie/data
    depends_on:
      - minio
    networks:
      - monitoring_net

  nessie-cli:
    image: ghcr.io/projectnessie/nessie-cli:0.107.4
    container_name: nessie_cli_tool
    profiles: [ "tools" ]
    stdin_open: true
    tty: true
    networks:
      - monitoring_net
    # command: [ "--uri", "http://nessie:19120/iceberg" ]
    depends_on:
      - nessie

  nessie-gc:
    image: ghcr.io/projectnessie/nessie-gc:latest
    container_name: nessie_gc_tool
    networks:
      - monitoring_net
    environment:
      - AWS_REGION=us-east-1

  trino:
    image: trinodb/trino:latest
    container_name: trino
    ports:
      - "9090:8080"
    restart: unless-stopped
    networks:
      - monitoring_net
    volumes:
      - ./trino_etc:/etc/trino
    depends_on:
      - minio
      - nessie
    mem_limit: 6gb

  vector:
    image: timberio/vector:latest-alpine
    container_name: vector
    ports:
      - "5001:5000"
    user: root
    restart: unless-stopped
    networks:
      - monitoring_net
    command: [ "--config", "/etc/vector/vector.yaml", "--watch-config" ]
    volumes:
      - ./config/config_docker/vector_config.yaml:/etc/vector/vector.yaml:ro
      - ./vector_log:/tmp/vector_log
      - vector_data:/var/lib/vector

volumes:
  db_data:
  grafana_data:
  kafka_data:
  minio_data:
  promtail_data:
  nessie_data:
  trino:
  plugins-trino:
  loki_data:
  vector_data:


networks:
  monitoring_net:
    driver: bridge
