models:
  - name: silver_dim_company
    description: "Silver layer for the company dimension. This model applies rigorous data quality tests, deduplication, and transformations to prepare raw data for downstream analytics. It ensures that the company metadata is clean, strictly typed, and business-ready."
    data_tests:
      - dbt_expectations.expect_table_columns_to_contain_set:
          arguments:
            column_list: ["silver_invocation_id", "silver_updated_at"]
            
    columns:
      - name: ticker
        data_type: varchar
        description: "Unique 3-character ticker symbol of the listed company (e.g., VIC, FPT)."
        data_tests:
          - unique
          - not_null
          - relationships: 
              arguments:
                to: ref('bronze_dim_company') 
                field: ticker
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^[A-Z0-9]{3}$"


      - name: company_name
        data_type: varchar
        description: "Full registered legal name of the company."
        data_tests:
          - not_null
      
      - name: industry_group
        data_type: varchar
        description: "Broad industry classification of the company (e.g., Technology, Financials, Real Estate)."
        data_tests:
          - not_null

      - name: sector_detail
        data_type: varchar
        description: "Granular sector detail or sub-industry of the company (e.g., Software, Banking, Insurance)."
        data_tests:
          - not_null
      
      - name: company_type
        data_type: varchar
        description: "Company type classification code (CT: Corporate/General, BH: Insurance, NH: Banking, CK: Securities)."
        data_tests:
          - accepted_values:
              arguments:
                values: ['CT', 'BH', 'NH', 'CK']
          - not_null

      - name: silver_updated_at
        data_type: timestamp(6) with time zone
        description: "Timestamp indicating when the record was last updated or transformed in the Silver layer."
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32
           
      - name: silver_invocation_id
        data_type: varchar
        description: "Unique identifier generated by dbt for the Silver layer pipeline run, used for auditing and debugging."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:    
                value: 1