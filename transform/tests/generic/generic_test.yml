
macros:
  - name: test_invalid_rate
    description: >
      Custom test to monitor the proportion of invalid records (e.g., checking if status = 'unqualified').
      It calculates the ratio of invalid rows to total rows in basis points (bps).
      Designed to be used with `warn_if` and `error_if` configurations to act as an automated data quality circuit breaker.
    arguments:
      - name: model
        type: string
        description: "The target model to be tested (passed automatically by dbt)."
      - name: column_name
        type: string
        description: "The column to evaluate (e.g., status)."
      - name: invalid_value
        type: string
        description: "The specific string value that represents an invalid state (e.g., 'unqualified')."

  - name: test_null_rate
    description: >
      Custom test to monitor the proportion of NULL values in a specific column.
      It calculates the ratio of NULL rows to total rows in basis points (bps).
      Ideal for enforcing data completeness thresholds using `warn_if` and `error_if`.
    arguments:
      - name: model
        type: string
        description: "The target model to be tested (passed automatically by dbt)."
      - name: column_name
        type: string
        description: "The column to evaluate for missing (NULL) values."
