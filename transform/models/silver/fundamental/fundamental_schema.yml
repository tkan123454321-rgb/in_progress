version: 2

models:
  # ==========================================
  # 1. SILVER FUNDAMENTAL 1 (Valuation & Ownership)
  # ==========================================
  - name: silver_fundamental_1
    description: "Cleaned and validated fundamental data (part 1) focusing on share structure, valuation, and ownership metrics. This layer applies data quality (DQ) rules, de-duplication, and business logic to ensure the data is accurate, consistent, and ready for the Gold layer."
    data_tests:
      - dbt_expectations.expect_column_pair_values_A_to_be_greater_than_B:
          arguments:
            column_A: shares_outstanding
            column_B: floating_shares
            or_equal: true
      - dbt_expectations.expect_table_columns_to_contain_set:
          arguments:
            column_list: ["silver_invocation_id", "silver_updated_at"]
    columns:
      - name: ticker
        data_type: varchar
        description: "The unique stock symbol/ticker of the company (e.g., VCB, FPT)."
        data_tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^[A-Z0-9]{3}$"
          - relationships:
              arguments:
                to: ref('silver_dim_company')
                field: ticker

      - name: shares_outstanding
        data_type: double
        description: "Total number of shares outstanding for the company."
        data_tests:
          - null_rate:
              description: "Check ratio of null values in basis points (bps). 100 bps = 1%."
              config:
                error_if: "> 100"

      - name: floating_shares
        data_type: double
        description: "Number of shares available for public trading (excluding restricted shares)."
        data_tests:
          - null_rate:
              description: "Check ratio of null values in basis points (bps). 100 bps = 1%."
              config:
                error_if: "> 600"

      - name: market_cap
        data_type: double
        description: "Total market capitalization of the company (shares_outstanding * closing_price)."
        data_tests:
          - null_rate:
              description: "Check ratio of null values in basis points (bps). 100 bps = 1%."
              config:
                error_if: "> 100"

      - name: avg_volume_3m
        data_type: double
        description: "Average daily trading volume of the stock over the trailing 3-month period."
        data_tests:
          - null_rate:
              description: "Check ratio of null values in basis points (bps). 100 bps = 1%."
              config:
                error_if: "> 100"

      - name: insider_ownership
        data_type: double
        description: "Percentage of outstanding shares held by company insiders (e.g., executives, founders)."

      - name: institution_ownership
        data_type: double
        description: "Percentage of outstanding shares held by institutional investors (e.g., mutual funds, pension funds)."

      - name: foreign_ownership
        data_type: double
        description: "Percentage of outstanding shares held by foreign investors."

      - name: unqualified_reason
        data_type: varchar
        description: "A comma-separated list of data quality violations (e.g., 'market_cap < 0'). Null if the record passes all DQ checks."

      - name: status
        data_type: varchar
        description: "Data quality status indicator. Evaluated as 'qualified' if no DQ rules are violated, otherwise 'unqualified'."
        data_tests:
          - accepted_values:
              arguments:
                values: ['qualified', 'unqualified']
          - invalid_rate:
              description: "Custom test to check the ratio of unqualified records, expressed in basis points (bps). 100 bps = 1%."
              arguments:
                invalid_value: 'unqualified'
              config:
                warn_if: "> 499"
                error_if: "> 500"

      - name: silver_invocation_id
        data_type: varchar
        description: "Audit column: The unique dbt invocation ID generated during the Silver run."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:
                value: 1

      - name: silver_updated_at
        data_type: timestamp(6) with time zone
        description: "Audit column: Timestamp indicating when the record was validated and updated in the Silver layer."
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32

  # ==========================================
  # 2. SILVER FUNDAMENTAL 2 (Exchange & Listing)
  # ==========================================
  - name: silver_fundamental_2
    description: "Cleaned and validated fundamental data (part 2) containing listing status and exchange information. This layer applies data quality (DQ) rules to filter out invalid exchanges and delisted stocks."
    data_tests:
      - dbt_expectations.expect_table_columns_to_contain_set:
          arguments:
            column_list: ["silver_invocation_id", "silver_updated_at"]
    columns:
      - name: ticker
        data_type: varchar
        description: "The unique stock symbol/ticker of the company."
        data_tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^[A-Z0-9]{3}$"
          - relationships:
              arguments:
                to: ref('silver_dim_company')
                field: ticker

      - name: exchange
        data_type: varchar
        description: "The stock exchange where the company is listed (e.g., HSX, HNX, UPCOM)."
        data_tests:
          - not_null

      - name: is_listing
        data_type: boolean
        description: "Boolean flag indicating whether the stock is currently actively listed (True) or delisted/suspended (False)."
        data_tests:
          - not_null

      - name: unqualified_reason
        data_type: varchar
        description: "A comma-separated list of data quality violations (e.g., 'invalid_exchange', 'delisted_or_inactive'). Null if the record passes all DQ checks."

      - name: status
        data_type: varchar
        description: "Data quality status indicator. Evaluated as 'qualified' if no DQ rules are violated, otherwise 'unqualified'."
        data_tests:
          - accepted_values:
              arguments:
                values: ['qualified', 'unqualified']
          - invalid_rate:
              description: "Custom test to check the ratio of unqualified records, expressed in basis points (bps). 100 bps = 1%."
              arguments:
                invalid_value: 'unqualified'
              config:
                warn_if: "> 499"
                error_if: "> 500"

      - name: silver_invocation_id
        data_type: varchar
        description: "Audit column: The unique dbt invocation ID generated during the Silver run."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:
                value: 1

      - name: silver_updated_at
        data_type: timestamp(6) with time zone
        description: "Audit column: Timestamp indicating when the record was validated and updated in the Silver layer."
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32

  # ==========================================
  # 3. SILVER FUNDAMENTAL QUARTER
  # ==========================================
  - name: silver_fundamental_quarter
    description: "Cleaned and validated quarterly fundamental data. This layer applies data quality rules, ensuring accurate year/quarter combinations and deduplication before passing metrics (like preferred stock and market cap) to the Gold layer."
    data_tests:
      - dbt_expectations.expect_table_columns_to_contain_set:
          arguments:
            column_list: ["silver_invocation_id", "silver_updated_at"]
      - dbt_expectations.expect_compound_columns_to_be_unique:
          arguments:
            column_list: ["ticker", "year", "quarter"]

    columns:
      - name: ticker
        data_type: varchar
        description: "The unique stock symbol/ticker of the company."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^[A-Z0-9]{3}$"
          - relationships:
              arguments:
                to: ref('gold_dim_company')
                field: ticker

      - name: year
        data_type: integer
        description: "The reporting financial year."
        data_tests:
          - not_null

      - name: quarter
        data_type: integer
        description: "The reporting financial quarter."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: [1, 2, 3, 4]
              quote_values: false

      - name: preferred_stock
        data_type: decimal
        description: "Value of preferred stock issued by the company at the end of the quarter."
        data_tests:
          - not_null

      - name: market_cap
        data_type: decimal
        description: "Total market capitalization at the end of the reported quarter."
        data_tests:
          - not_null

      - name: shares_outstanding
        data_type: decimal
        description: "Total number of shares outstanding at the end of the reported quarter."
        data_tests:
          - not_null

      - name: unqualified_reason
        data_type: varchar
        description: "A comma-separated list of DQ violations. Null if the record passes all DQ checks."

      - name: status
        data_type: varchar
        description: "Data quality status indicator. Evaluated as 'qualified' if no DQ rules are violated, otherwise 'unqualified'."
        data_tests:
          - accepted_values:
              arguments:
                values: ['qualified', 'unqualified']
          - invalid_rate:
              description: "Custom test to check the ratio of unqualified records, expressed in basis points (bps). 100 bps = 1%."
              arguments:
                invalid_value: 'unqualified'
              config:
                warn_if: "> 499"
                error_if: "> 500"

      - name: silver_invocation_id
        data_type: varchar
        description: "Audit column: The unique dbt invocation ID generated during the Silver run."
        data_tests:
          - not_null

      - name: silver_updated_at
        data_type: timestamp(6) with time zone
        description: "Audit column: Timestamp indicating when the record was validated and updated in the Silver layer."
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32
