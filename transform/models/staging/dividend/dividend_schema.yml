models:
  - name: staging_dividend
    description: "Staging layer for annual corporate dividend data. This model parses the raw JSON payload to extract cash and stock dividend values, filters out invalid historical records, and appends standard audit columns for downstream processing."
    data_tests:
      - dbt_expectations.expect_table_columns_to_contain_set:
          arguments:
            column_list: ["staging_invocation_id", "staged_at", "bronze_ingested_time"]
    columns:
      - name: ticker
        data_type: varchar
        description: "Unique ticker symbol of the listed company."

      - name: year
        data_type: integer
        description: "The year corresponding to the corporate dividend action."

      - name: cash_dividend
        data_type: double
        description: "The amount of cash dividend paid per share."

      - name: stock_dividend
        data_type: double
        description: "The percentage or ratio of stock dividend issued to shareholders."

      - name: bronze_ingested_time
        data_type: timestamp(6) with time zone
        description: "Timestamp indicating when the raw data was ingested into the Bronze layer."
        data_tests:
          - not_null

      - name: staged_at
        data_type: timestamp(6) with time zone
        description: "Timestamp indicating when the data was processed in the staging layer."
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32

      - name: staging_invocation_id
        data_type: varchar
        description: "Unique identifier generated by dbt for each pipeline run, used for tracking and debugging."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:
                value: 1
