models:
  # ====================================================================================
  # 1. BALANCE SHEET
  # ====================================================================================
  - name: silver_bl_quarter
    description: "Cleaned and validated quarterly Balance Sheet data. This layer applies data quality rules, ensuring accurate year/quarter combinations and deduplication. Complex accounting equations are evaluated via custom macros."
    data_tests:
      - dbt_expectations.expect_table_columns_to_contain_set:
          arguments:
            column_list: ["silver_invocation_id", "silver_updated_at"]
      - dbt_expectations.expect_compound_columns_to_be_unique:
          arguments:
            column_list: ["ticker", "year", "quarter"]

    columns:
      - name: ticker
        data_type: varchar
        description: "The unique stock symbol/ticker of the company."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^[A-Z0-9]{3}$"
          - relationships:
              arguments:
                to: ref('gold_dim_company')
                field: ticker

      - name: year
        data_type: integer
        description: "The reporting financial year."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 2018
                max_value: 2050

      - name: quarter
        data_type: integer
        description: "The reporting financial quarter."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: [1, 2, 3, 4]
              quote_values: false

      - name: total_assets
        data_type: decimal
        description: "Total assets owned by the company."
        data_tests: 
          - not_null

      - name: total_capital
        data_type: decimal
        description: "Total capital (Total Liabilities + Total Equity)."
        data_tests:
          - not_null

      - name: current_assets
        data_type: decimal
        description: "Short-term assets expected to be converted into cash within one year."
        data_tests: 
          - not_null

      - name: long_term_assets
        data_type: decimal
        description: "Assets not intended to be turned into cash within one year."
        data_tests: 
          - not_null

      - name: total_liabilities
        data_type: decimal
        description: "Total financial obligations or debts."
        data_tests: 
          - not_null

      - name: total_equity
        data_type: decimal
        description: "Total shareholders' equity."
        data_tests: 
          - not_null

      - name: current_liabilities
        data_type: decimal
        description: "Short-term financial obligations due within one year."
        data_tests: 
          - not_null

      - name: long_term_liabilities
        data_type: decimal
        description: "Financial obligations due after more than one year."
        data_tests: 
          - not_null

      - name: cash_and_equivalents
        data_type: decimal
        description: "Total cash and highly liquid assets."
        data_tests: 
          - not_null

      - name: income_taxes_payable
        data_type: decimal
        description: "Amount of income tax owed to the government."
        data_tests: 
          - not_null

      - name: minority_interest
        data_type: decimal
        description: "Portion of a subsidiary corporation's stock that is not owned by the parent corporation."
        data_tests: 
          - not_null

      - name: retained_earnings
        data_type: decimal
        description: "Cumulative net earnings or profit retained by the company."
        data_tests: 
          - not_null

      - name: fixed_assets
        data_type: decimal
        description: "Long-term tangible pieces of property or equipment."
        data_tests: 
          - not_null

      - name: short_term_receivables
        data_type: decimal
        description: "Amounts owed to the company by its customers, due within a year."
        data_tests: 
          - not_null

      - name: short_term_debt
        data_type: decimal
        description: "Short-term borrowings due within one year."
        data_tests: 
          - not_null

      - name: current_portion_lt_debt
        data_type: decimal
        description: "Portion of long-term debt that is due within the current year."
        data_tests: 
          - not_null

      - name: repo_transactions
        data_type: decimal
        description: "Repurchase agreements (common in banking/financial sectors)."
        data_tests: 
          - not_null

      - name: long_term_debt
        data_type: decimal
        description: "Loans and financial obligations lasting over one year."
        data_tests: 
          - not_null

      - name: convertible_bonds
        data_type: decimal
        description: "Fixed-income corporate debt security that yields interest payments, but can be converted into a predetermined number of common stock."
        data_tests: 
          - not_null

      - name: silver_updated_at
        data_type: timestamp(6) with time zone
        description: "Audit column: Timestamp indicating when the record was validated in the Silver layer."
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32

      - name: silver_invocation_id
        data_type: varchar
        description: "Audit column: The unique dbt invocation ID generated during the Silver run."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:    
                value: 1

      - name: status
        data_type: varchar
        description: "Data quality status indicator. Evaluated as 'qualified' if no DQ rules are violated, otherwise 'unqualified'."
        data_tests:
          - accepted_values:
              arguments:
                values: ['qualified', 'unqualified']
          - invalid_rate:
              description: "Custom test to check the ratio of unqualified records, expressed in basis points (bps). 1000 bps = 10%."
              arguments:
                invalid_value: 'unqualified'
              config:
                warn_if: "> 900"
                error_if: "> 1000"

      - name: unqualified_reason
        data_type: varchar
        description: "A comma-separated list of DQ violations. Null if the record passes all DQ checks."

  # ====================================================================================
  # 2. CASH FLOW INDIRECT
  # ====================================================================================
  - name: silver_cf_quarter
    description: "Cleaned and validated quarterly Cash Flow statement data. Tracks the inflow and outflow of cash, categorized by operating, investing, and financing activities."
    data_tests:
      - dbt_expectations.expect_table_columns_to_contain_set:
          arguments:
            column_list: ["silver_invocation_id", "silver_updated_at"]
      - dbt_expectations.expect_compound_columns_to_be_unique:
          arguments:
            column_list: ["ticker", "year", "quarter"]

    columns:
      - name: ticker
        data_type: varchar
        description: "The unique stock symbol/ticker of the company."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^[A-Z0-9]{3}$"
          - relationships:
              arguments:
                to: ref('gold_dim_company')
