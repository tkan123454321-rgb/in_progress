models:
  - name: gold_value_and_momentum_z
    description: "Gold model calculating the historical cross-sectional Z-Scores for Value and Momentum factors, aligned by quarter."
    data_tests:
      - dbt_expectations.expect_compound_columns_to_be_unique:
          arguments:
            column_list: ["ticker", "absolute_quarter"]

    columns:
      - name: ticker
        data_type: varchar
        description: "The unique stock symbol/ticker."

      - name: year
        data_type: bigint
        description: "The reporting financial year."

      - name: quarter
        data_type: bigint
        description: "The reporting financial quarter."


      - name: absolute_quarter
        data_type: bigint
        description: "Continuous quarter timeline (year * 4 + quarter)."


      - name: value_raw_score
        data_type: decimal
        description: "The raw historical Book-to-Market ratio."

      - name: momentum_raw_score
        data_type: decimal
        description: "The raw historical 12M-1M return ratio."

      - name: z_value
        data_type: double
        description: "The standardized Z-Score for the Value factor."
        data_tests:
          - dbt_expectations.expect_column_values_to_not_be_null:
              row_condition: "status = 'qualified'"

      - name: z_momentum
        data_type: double
        description: "The standardized Z-Score for the Momentum factor."
        data_tests:
          - dbt_expectations.expect_column_values_to_not_be_null:
              row_condition: "status = 'qualified'"

      - name: unqualified_reason
        data_type: varchar
        description: "Reason for disqualification (e.g., missing metrics)."

      - name: status
        data_type: varchar
        description: "Data quality status. Evaluated as 'qualified' if both Value and Momentum Z-Scores are successfully calculated."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['qualified', 'unqualified']

      - name: gold_updated_at
        data_type: timestamp(6) with time zone
        description: "Audit column: Timestamp indicating when the Gold model was run."
        data_tests:
          - not_null

      - name: gold_invocation_id
        data_type: varchar
        description: "Audit column: The unique dbt invocation ID."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:    
                value: 1


  - name: gold_value_and_momentum_z_recent
    description: "Gold model calculating the latest 'Live' cross-sectional Z-Scores for Value and Momentum across the current market snapshot."
  
    columns:
      - name: ticker
        data_type: varchar
        description: "The unique stock symbol/ticker."

      - name: value_recent_score
        data_type: double
        description: "The raw live Book-to-Market ratio."

      - name: momentum_recent
        data_type: decimal
        description: "The raw live 12M-1M return ratio."

      - name: z_value_recent
        data_type: double
        description: "The standardized Z-Score for the live Value factor."
        data_tests:
          - dbt_expectations.expect_column_values_to_not_be_null:
              row_condition: "status = 'qualified'"

      - name: z_momentum_recent
        data_type: double
        description: "The standardized Z-Score for the live Momentum factor."
        data_tests:
          - dbt_expectations.expect_column_values_to_not_be_null:
              row_condition: "status = 'qualified'"

      - name: unqualified_reason
        data_type: varchar
        description: "Reason for disqualification."

      - name: status
        data_type: varchar
        description: "Data quality status. Evaluated as 'qualified' if both live Value and Momentum Z-Scores are successfully calculated."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['qualified', 'unqualified']

      - name: gold_updated_at
        data_type: timestamp(6) with time zone
        description: "Audit column: Timestamp indicating when the Gold model was run."
        data_tests:
          - not_null

      - name: gold_invocation_id
        data_type: varchar
        description: "Audit column: The unique dbt invocation ID."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:    
                value: 1