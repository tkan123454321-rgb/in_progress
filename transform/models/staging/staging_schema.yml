models:
  - name: raw_dim_company
    description: "dim_company's staging layer, renaming column names, trimming white spaces and changing data types. It prepares the data for the silver layer."
    columns:
      - name: company_sk
        data_type: varchar
        description: "surrogate key for tickers, generated by hashing the ticker by MD5"
        data_tests:
          - not_null
          - unique


      - name: ticker
        data_type: varchar
        description: "ticker symbol of the company, e.g. VIC, FPT, etc."
        data_tests:
          - not_null
          - unique

      - name: company_name
        data_type: varchar
        description: "the official name of the company, e.g. Vietnam International Airport, FPT Corporation, etc."
        data_tests:
          - not_null


      - name: industry_group
        data_type: varchar
        description: "industry group of the company, e.g. Technology, Financials, etc."
        data_tests:
          - not_null
            

      - name: sector_detail
        data_type: varchar
        description: "sector detail of the company, e.g. Software, Hardware, etc."
        data_tests:
          - not_null


      - name: ingested_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was ingested into the staging layer"
        data_tests:
          - not_null

      - name: staged_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was staged"
        data_tests:
          - not_null

