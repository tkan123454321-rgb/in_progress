models:
  - name: silver_dim_company
    description: "dim_company's silver layer, applying data quality tests, de-duplications and transformations to prepare the data for analytics and reporting. It ensures that the data is clean, consistent, and ready for use in the business intelligence layer."
    data_tests:
      - dbt_expectations.expect_table_columns_to_contain_set:
          column_list: ["staging_invocation_id", "staged_at","silver_invocation_id", "silver_updated_at"]
    columns:

      - name: ticker
        data_type: varchar
        description: "ticker symbol of the company, e.g. VIC, FPT, etc."
        data_tests:
          - unique
          - not_null
          - relationships: # Kiểm tra xem ticker này có tồn tại trong bảng gốc không
              to: ref('raw_dim_company')
              field: ticker

      - name: company_name
        data_type: varchar
        description: "name of the company"
        data_tests:
          - not_null
      

      - name: industry_group
        data_type: varchar
        description: "industry group of the company, e.g. Technology, Financials, etc."
        data_tests:
          - not_null

      - name: sector_detail
        data_type: varchar
        description: "sector detail of the company, e.g. Software, Hardware, etc."
        data_tests:
          - not_null

      - name: staged_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was staged in the silver layer"
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              datepart: day
              interval: 32

      - name: silver_updated_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was last updated in the silver layer"
        data_tests:
          - not_null
           
      - name: silver_invocation_id
        data_type: varchar
        description: "unique identifier for the silver layer invocation, used for debugging processes"
        data_tests:
          - not_null

      - name: staging_invocation_id
        data_type: varchar
        description: "unique identifier for the staging layer invocation, used for debugging processes"
        data_tests:
          - not_null

  - name: silver_fundamental
    description: "fundamental data in the silver layer, applying data business tests, de-duplications and transformations to prepare the data for analytics and reporting. It ensures that the data is clean, consistent, and ready for use in the business intelligence layer."
    data_tests:
      - dbt_expectations.expect_table_columns_to_contain_set:
          column_list: ["staging_invocation_id", "staged_at","silver_invocation_id", "silver_updated_at"]
    columns:
      - name: ticker
        data_type: varchar
        description: "ticker symbol of the company, e.g. VIC, FPT, etc."
        data_tests:
          - unique
          - relationships: # Kiểm tra xem ticker này có tồn tại trong bảng dim_company không
              to: ref('silver_dim_company')
              field: ticker

      - name: shares_outstanding
        data_type: double
        description: "total number of shares outstanding"
        data_tests:
          - null_rate:
              config:
                warn_if: "> 300"
                error_if: "> 600"
        

      - name: floating_shares
        data_type: double
        description: "number of shares available for trading"
        data_tests:
          - null_rate:
              config:
                warn_if: "> 300"
                error_if: "> 600"

      - name: market_cap
        data_type: double
        description: " total market capitalization of the company, calculated as shares_outstanding * closing_price"
        data_tests:
          - null_rate:
              config:
                error_if: "> 100"

      - name: avg_volume_3m
        data_type: double
        description: "average trading volume of the stock over the last 3 months"
        data_tests:
          - null_rate:
              config:
                error_if: "> 100"

      - name: insider_ownership
        data_type: double
        description: "percentage of outstanding shares held by company insiders (e.g. executives, founders)"
        data_tests:
          - null_rate:
              config:
                warn_if: "> 300"
                error_if: "> 600"

      - name: institution_ownership
        data_type: double
        description: "percentage of outstanding shares held by institutional investors (e.g. mutual funds, pension funds)"
        data_tests:
          - null_rate:
              config:
                warn_if: "> 2000"
                error_if: "> 3000"

      - name: foreign_ownership
        data_type: double
        description: "percentage of outstanding shares held by foreign investors"
        data_tests:
          - null_rate:
              config:
                warn_if: "> 300"
                error_if: "> 600"
      
      - name: status
        data_type: varchar
        description: "data quality status of the record, determined by the business test: if shares_outstanding, floating_shares or market_cap is negative, then the record is marked as 'unqualified', otherwise it's 'qualified'"
        data_tests:
          - accepted_values:
              values: ['qualified', 'unqualified']
          - invalid_rate:
              description: "Bài test tự chế để kiểm tra tỷ lệ rác (ví dụ: status = 'unqualified'). Nó sẽ đếm số dòng rác chia cho tổng số dòng"
              arguments:
                invalid_value: 'unqualified'
              config:
                error_if: "> 500"
                warn_if: "> 200"

      - name: staging_invocation_id
        data_type: varchar
        description: "unique identifier for the staging layer invocation, used for debugging processes"


      - name: staged_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was staged in the staging layer"

      - name: silver_invocation_id
        data_type: varchar
        description: "unique identifier for the silver layer invocation, used for debugging processes"


      - name: silver_updated_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was last updated in the silver layer"