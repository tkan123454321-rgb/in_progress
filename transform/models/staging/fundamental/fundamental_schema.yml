models:
  - name: staging_fundamental_1
    description: "Staging layer for daily fundamental metrics (e.g., market capitalization, outstanding shares). This model cleans raw data by renaming columns, trimming whitespace, and casting data types to prepare it for the Silver layer."
    data_tests:
      - dbt_expectations.expect_table_columns_to_contain_set:
          arguments:
            column_list: ["staging_invocation_id", "staged_at", "bronze_ingested_time"]
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 1000
            max_value: 2000
    columns:
      - name: ticker
        data_type: varchar
        description: "Unique ticker symbol of the listed company (e.g., VIC, FPT)."
        
      - name: shares_outstanding
        data_type: double
        description: "Total number of shares currently held by all shareholders."

      - name: floating_shares
        data_type: double
        description: "Number of shares available for trading by the general public."

      - name: market_cap
        data_type: double
        description: "Total market value of the company's outstanding shares."

      - name: avg_volume_3m
        data_type: double
        description: "Average daily trading volume of the stock over the last 3 months."

      - name: insider_ownership
        data_type: double
        description: "Percentage of outstanding shares held by company insiders (e.g., executives, founders)."

      - name: institution_ownership
        data_type: double
        description: "Percentage of outstanding shares held by institutional investors (e.g., mutual funds, pension funds)."

      - name: foreign_ownership
        data_type: double
        description: "Percentage of outstanding shares held by foreign investors."
      
      - name: staging_invocation_id
        data_type: varchar
        description: "Unique identifier generated by dbt for each pipeline run, used for tracking and debugging."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:    
                value: 1
          
      - name: staged_at
        data_type: timestamp(6) with time zone
        description: "Timestamp indicating when the data was processed in the staging layer."
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32

      - name: bronze_ingested_time
        data_type: timestamp(6) with time zone
        description: "Timestamp indicating when the raw data was ingested into the Bronze layer."
        data_tests:
          - not_null

  - name: staging_fundamental_2
    description: "Staging layer for core company metadata (e.g., exchange, listing status). This model handles basic renaming, trimming, and type casting for the Silver layer."
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          arguments:
            min_value: 1000
            max_value: 2000
      - dbt_expectations.expect_table_columns_to_contain_set:
          arguments:
            column_list: ["staging_invocation_id", "staged_at", "bronze_ingested_time"]

    columns:
      - name: ticker
        data_type: varchar
        description: "Unique ticker symbol of the listed company (e.g., VIC, FPT)."

      - name: exchange
        data_type: varchar
        description: "Stock exchange where the company is listed (e.g., HOSE, HNX, UPCOM)."

      - name: is_listing
        data_type: boolean
        description: "Indicates whether the company is currently actively listed and trading."

      - name: bronze_ingested_time
        data_type: timestamp(6) with time zone
        description: "Timestamp indicating when the raw data was ingested into the Bronze layer."
        data_tests:
          - not_null

      - name: staged_at
        data_type: timestamp(6) with time zone
        description: "Timestamp indicating when the data was processed in the staging layer."
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32

      - name: staging_invocation_id
        data_type: varchar
        description: "Unique identifier generated by dbt for each pipeline run, used for tracking and debugging."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:    
                value: 1
    
  - name: staging_fundamental_quarter
    description: "Staging layer for quarterly fundamental data. It cleans raw quarterly metrics, casts types, and adds audit columns before passing data to the Silver layer."
    data_tests:
      - dbt_expectations.expect_table_columns_to_contain_set:
          arguments:
            column_list: ["staging_invocation_id", "staged_at", "bronze_ingested_time"]
    columns:
      - name: ticker
        data_type: varchar
        description: "Unique ticker symbol of the listed company."

      - name: year
        data_type: integer
        description: "The reporting year of the fundamental data."

      - name: quarter
        data_type: integer
        description: "The reporting quarter of the fundamental data (1, 2, 3, or 4)."

      - name: preferred_stock
        data_type: decimal
        description: "Value of preferred stock issued by the company."

      - name: market_cap
        data_type: decimal
        description: "Total market capitalization at the end of the reported quarter."

      - name: shares_outstanding
        data_type: decimal
        description: "Total number of shares outstanding at the end of the reported quarter."

      - name: bronze_ingested_time
        data_type: timestamp(6) with time zone
        description: "Timestamp indicating when the raw data was ingested into the Bronze layer."
        data_tests:
          - not_null

      - name: staged_at
        data_type: timestamp(6) with time zone
        description: "Timestamp indicating when the data was processed in the staging layer."
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32

      - name: staging_invocation_id
        data_type: varchar
        description: "Unique identifier generated by dbt for each pipeline run, used for tracking and debugging."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:    
                value: 1


      