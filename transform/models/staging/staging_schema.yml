models:
  - name: raw_dim_company
    description: "dim_company's staging layer, renaming column names, trimming white spaces and changing data types. It prepares the data for the silver layer."
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1000
          max_value: 2000
    columns:
      - name: company_sk
        data_type: varchar
        description: "surrogate key for tickers, generated by hashing the ticker by MD5"
        data_tests:
          - not_null:
              config:
                severity: error
                error_if: "> 50"
          - unique:
              config:
                severity: error
                error_if: "> 10"

      - name: ticker
        data_type: varchar
        description: "ticker symbol of the company, e.g. VIC, FPT, etc."
        data_tests:
          - not_null
          - unique:
              config:
                severity: error
                error_if: "> 10"
        
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[A-Z0-9]{3}$"
              config:
                severity: error
                error_if: "> 50"

      - name: company_name
        data_type: varchar
        description: "the official name of the company, e.g. Vietnam International Airport, FPT Corporation, etc."
        data_tests:
          - not_null


      - name: industry_group
        data_type: varchar
        description: "industry group of the company, e.g. Technology, Financials, etc."
        data_tests:
          - not_null:
              config:
                severity: error
                error_if: "> 30"

      - name: sector_detail
        data_type: varchar
        description: "sector detail of the company, e.g. Software, Hardware, etc."
        data_tests:
          - not_null:
              config:
                severity: error
                error_if: "> 30"

      - name: ingested_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was ingested into the staging layer"
        data_tests:
          - not_null

      - name: staged_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was staged"
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              datepart: day
              interval: 32

