# Reference: learned from the Astronomer Cosmos open-source project.
# Purpose: Validates all GitHub Actions YAML files for syntax errors and invalid keywords.
# This runs in a separate file so it can catch and report parsing errors even if other workflows fail to start.

name: Validate workflow files

on:
  push:
    branches: [ main, test ]
    # ONLY trigger this workflow if files inside the .github/workflows directory are modified.
    paths: [ ".github/workflows/**" ]
  pull_request:
    branches: [ main ]
    paths: [ ".github/workflows/**" ]

jobs:
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read 
      
    steps:
      - name: Checkout repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run actionlint to validate workflow files
        uses: reviewdog/action-actionlint@5eaffa19a1991ecc52b11eddcdd57760d1ac7e3d # v1.72
        with:
          # Uses the default GitHub token to allow Reviewdog to comment errors directly on the PR
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: error