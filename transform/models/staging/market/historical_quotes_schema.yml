models:
  - name: staging_historical_quotes
    description: "Staging layer for daily historical stock quotes. This model cleans raw price and volume data, casts data types, and adds necessary audit columns to prepare for the Silver layer."
    data_tests:
      - dbt_expectations.expect_table_columns_to_contain_set:
          arguments:
            column_list: ["staging_invocation_id", "staged_at", "bronze_ingested_time"]
            
    columns:
      - name: ticker
        data_type: varchar
        description: "Unique ticker symbol of the listed company."

      - name: date
        data_type: date
        description: "The trading date of the stock."

      - name: price_basic
        data_type: decimal
        description: "The reference price of the stock for the trading session (usually the closing price of the previous session)."

      - name: price_open
        data_type: decimal
        description: "The opening price of the stock at the beginning of the trading session."

      - name: price_high
        data_type: decimal
        description: "The highest traded price of the stock during the session."

      - name: price_low
        data_type: decimal
        description: "The lowest traded price of the stock during the session."

      - name: price_close
        data_type: decimal
        description: "The final closing price of the stock at the end of the trading session."

      - name: total_volume
        data_type: double
        description: "Total number of shares traded during the session."

      - name: total_value
        data_type: double
        description: "Total trading value (turnover) of the stock during the session."

      - name: bronze_ingested_time
        data_type: timestamp(6) with time zone
        description: "Timestamp indicating when the raw data was ingested into the Bronze layer."
        data_tests:
          - not_null

      - name: staged_at
        data_type: timestamp(6) with time zone
        description: "Timestamp indicating when the data was processed in the staging layer."
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32

      - name: staging_invocation_id
        data_type: varchar
        description: "Unique identifier generated by dbt for each pipeline run, used for tracking and debugging."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:    
                value: 1