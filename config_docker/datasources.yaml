apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      timeout: 60
      maxLines: 1000
  - name: trino-elementary
    type: trino-datasource
    access: proxy
    url: http://trino:8080
    database: lakehouse
    jsonData:
      Catalog: lakehouse
      Schema: elementary


