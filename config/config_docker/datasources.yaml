apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      timeout: 60
      maxLines: 1000
  - name: trino-elementary
    type: trino-datasource
    access: proxy
    url: http://trino:8080
    database: lakehouse
    jsonData:
      Catalog: lakehouse
      Schema: elementary
  - name: Postgres
    type: postgres
    url: postgres:5432 
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD} 
    jsonData:
      database: ops_db
      sslmode: 'disable'
      maxOpenConns: 100
      maxIdleConns: 100
      maxIdleConnsAuto: true
      connMaxLifetime: 14400
      postgresVersion: 1500 
      timescaledb: false


