  #   encoding:
  #     codec: json

  postgres_finops_output:
    type: postgres
    inputs: 
      - trino_processed
    endpoint: "postgresql://tkan:Tkan2005@postgres:5432/finance_db"
    table: "finops.trino_finops_logs"
    

    batch:
      max_events: 500      
      timeout_secs: 5      
    buffer:
      type: disk           
      max_size: 1073741824 
      when_full: block
