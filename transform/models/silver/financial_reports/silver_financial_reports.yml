      - name: year
        data_type: integer
        description: "The reporting financial year."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 2018
                max_value: 2050

      - name: quarter
        data_type: integer
        description: "The reporting financial quarter."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: [1, 2, 3, 4]
              quote_values: false

      - name: cfo
        data_type: decimal
        description: "Cash Flow from Operating activities."
        data_tests: 
          - not_null

      - name: cfi
        data_type: decimal
        description: "Cash Flow from Investing activities."
        data_tests: 
          - not_null

      - name: cff
        data_type: decimal
        description: "Cash Flow from Financing activities."
        data_tests: 
          - not_null

      - name: net_cash_flow
        data_type: decimal
        description: "Net increase or decrease in cash and cash equivalents."
        data_tests: 
          - not_null

      - name: depreciation
        data_type: decimal
        description: "Depreciation and amortization expense added back to net income."
        data_tests: 
          - not_null

      - name: capex
        data_type: decimal
        description: "Capital Expenditures (cash spent to acquire or maintain fixed assets)."
        data_tests: 
          - not_null

      - name: profit_before_tax_cf
        data_type: decimal
        description: "Profit before tax adjusted for cash flow purposes."
        data_tests: 
          - not_null

      - name: delta_receivables
        data_type: decimal
        description: "Changes in accounts receivable."
        data_tests:
          - not_null

      - name: delta_inventory
        data_type: decimal
        description: "Changes in inventory levels."
        data_tests: 
          - not_null

      - name: delta_payables
        data_type: decimal
        description: "Changes in accounts payable."
        data_tests: 
          - not_null

      - name: borrowings_received
        data_type: decimal
        description: "Cash inflows from issuing debt or borrowing."
        data_tests: 
          - not_null

      - name: debt_repaid
        data_type: decimal
        description: "Cash outflows for the repayment of debt principal."
        data_tests: 
          - not_null

      - name: dividends_paid
        data_type: decimal
        description: "Cash dividends paid out to shareholders."
        data_tests: 
          - not_null

      - name: beginning_cash
        data_type: decimal
        description: "Cash balance at the beginning of the reporting period."
        data_tests: 
          - not_null

      - name: exchange_rate_effect
        data_type: decimal
        description: "Impact of foreign exchange rate changes on cash balances."
        data_tests: 
          - not_null

      - name: ending_cash
        data_type: decimal
        description: "Cash balance at the end of the reporting period."
        data_tests: 
          - not_null

      - name: silver_updated_at
        data_type: timestamp(6) with time zone
        description: "Audit column: Timestamp indicating when the record was validated in the Silver layer."
        data_tests: 
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32

      - name: silver_invocation_id
        data_type: varchar
        description: "Audit column: The unique dbt invocation ID generated during the Silver run."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:    
                value: 1

      - name: status
        data_type: varchar
        description: "Data quality status indicator."
        data_tests:
          - accepted_values:
              arguments:
                values: ['qualified', 'unqualified']
          - invalid_rate:
              description: "Custom test to check the ratio of unqualified records, expressed in basis points (bps). 1000 bps = 10%."
              arguments:
                invalid_value: 'unqualified'
              config:
                warn_if: "> 900"
                error_if: "> 1000"

      - name: unqualified_reason
        data_type: varchar
        description: "A comma-separated list of DQ violations."

  # ====================================================================================
  # 3. INCOME STATEMENT 
  # ====================================================================================
  - name: silver_ic_quarter
    description: "Cleaned and validated quarterly Income Statement data. Details the company's revenues, expenses, and profitability metrics over the quarter."
    data_tests:
      - dbt_expectations.expect_table_columns_to_contain_set:
          arguments:
            column_list: ["silver_invocation_id", "silver_updated_at"]
      - dbt_expectations.expect_compound_columns_to_be_unique:
          arguments:
            column_list: ["ticker", "year", "quarter"]

    columns:
      - name: ticker
        data_type: varchar
        description: "The unique stock symbol/ticker of the company."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: "^[A-Z0-9]{3}$"
          - relationships:
              arguments:
                to: ref('gold_dim_company')
                field: ticker

      - name: year
        data_type: integer
        description: "The reporting financial year."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 2018
                max_value: 2050

      - name: quarter
        data_type: integer
        description: "The reporting financial quarter."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: [1, 2, 3, 4]
              quote_values: false

      - name: gross_revenue
        data_type: decimal
        description: "Total gross sales or revenue generated."
        data_tests:
          - not_null

      - name: revenue_deduction
        data_type: decimal
        description: "Deductions from revenue (e.g., sales returns, allowances, discounts)."
        data_tests: 
          - not_null

      - name: net_revenue
        data_type: decimal
        description: "Gross revenue minus revenue deductions."
        data_tests: 
          - not_null

      - name: cogs
        data_type: decimal
        description: "Cost of Goods Sold (direct costs attributable to the production of goods)."
        data_tests: 
          - not_null

      - name: gross_profit
        data_type: decimal
        description: "Net revenue minus COGS."
        data_tests: 
          - not_null

      - name: financial_income
        data_type: decimal
        description: "Income generated from financial activities (e.g., interest income, dividends)."
        data_tests: 
          - not_null

      - name: financial_expense
        data_type: decimal
        description: "Expenses related to financial activities."
        data_tests:
          - not_null

      - name: interest_expense
        data_type: decimal
        description: "Cost incurred by an entity for borrowed funds."
        data_tests:
          - not_null

      - name: affiliate_profit
        data_type: decimal
        description: "Share of profit or loss from joint ventures and associates."
        data_tests: 
          - not_null

      - name: selling_expense
        data_type: decimal
        description: "Costs incurred to promote and sell products/services."
        data_tests:
          - not_null

      - name: admin_expense
        data_type: decimal
        description: "General and administrative expenses."
        data_tests: 
          - not_null

      - name: operating_profit
        data_type: decimal
        description: "Profit realized from a business's operations, excluding tax and interest."
        data_tests: 
          - not_null

      - name: other_income
        data_type: decimal
        description: "Income from secondary operations or extraordinary items."
        data_tests: 
          - not_null

      - name: other_expense
        data_type: decimal
        description: "Expenses from secondary operations or extraordinary items."
        data_tests: 
          - not_null

      - name: other_profit
        data_type: decimal
        description: "Net other income (Other Income - Other Expense)."
        data_tests: 
          - not_null

      - name: profit_before_tax
        data_type: decimal
        description: "Total profit before income taxes are deducted."
        data_tests: 
          - not_null

      - name: current_tax
        data_type: decimal
        description: "Current corporate income tax expense."
        data_tests: 
          - not_null

      - name: deferred_tax
        data_type: decimal
        description: "Deferred corporate income tax expense/benefit."
        data_tests: 
          - not_null

      - name: income_tax_expense
        data_type: decimal
        description: "Total income tax expense."
        data_tests: 
          - not_null

      - name: net_income
        data_type: decimal
        description: "Total net income or profit after taxes."
        data_tests: 
          - not_null

      - name: minority_interest
        data_type: decimal
        description: "Net income attributable to non-controlling interests."
        data_tests: 
          - not_null

      - name: net_income_parent
        data_type: decimal
        description: "Net income attributable to the shareholders of the parent company."
        data_tests: 
          - not_null

      - name: silver_updated_at
        data_type: timestamp(6) with time zone
        description: "Audit column: Timestamp indicating when the record was validated in the Silver layer."
        data_tests: 
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32

      - name: silver_invocation_id
        data_type: varchar
        description: "Audit column: The unique dbt invocation ID generated during the Silver run."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:    
                value: 1

      - name: status
        data_type: varchar
        description: "Data quality status indicator."
        data_tests:
          - accepted_values:
              arguments:
                values: ['qualified', 'unqualified']
          - invalid_rate:
              description: "Custom test to check the ratio of unqualified records, expressed in basis points (bps). 1000 bps = 10%."
              arguments:
                invalid_value: 'unqualified'
              config:
                warn_if: "> 900"
                error_if: "> 1000"

      - name: unqualified_reason
        data_type: varchar
        description: "A comma-separated list of DQ violations."