models:
  - name: staging_dim_company
    description: "dim_company's staging layer, renaming column names, trimming white spaces and changing data types. It prepares the data for the silver layer."
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1000
          max_value: 2000
      - dbt_expectations.expect_table_columns_to_contain_set:
          column_list: ["staging_invocation_id", "staged_at", "bronze_ingested_time"]
    columns:
      - name: ticker
        data_type: varchar
        description: "ticker symbol of the company, e.g. VIC, FPT, etc."


      - name: company_name
        data_type: varchar
        description: "the official name of the company, e.g. Vietnam International Airport, FPT Corporation, etc."



      - name: industry_group
        data_type: varchar
        description: "industry group of the company, e.g. Technology, Financials, etc."


      - name: sector_detail
        data_type: varchar
        description: "sector detail of the company, e.g. Software, Hardware, etc."

      
      - name: com_type_code
        data_type: varchar
        description: "company type code, CT: công ty, BH: bảo hiểm, NH: ngân hàng, CK: chứng khoán"


      - name: bronze_ingested_time
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was inserted into the bronze layer"
        data_tests:
          - not_null

      - name: staged_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was staged"
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32
      
      - name: staging_invocation_id
        data_type: varchar
        description: "staging invocation id generated by dbt for each run, used for tracking and debugging"
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:    
                value: 1



  - name: staging_fundamental_1
    description: "staging layer for fundamental data(marketcap, freeshare, shareoutstanding,..), renaming column names, trimming white spaces and changing data types. It prepares the data for the silver layer."
    data_tests:
      - dbt_expectations.expect_table_columns_to_contain_set:
          column_list: ["staging_invocation_id", "staged_at", "bronze_ingested_time"]
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1000
          max_value: 2000

    columns:

      - name: ticker
        data_type: varchar
        description: "ticker symbol of the company, e.g. VIC, FPT, etc."


      - name: shares_outstanding
        data_type: double


      - name: floating_shares
        data_type: double


      - name: market_cap
        data_type: double


      - name: avg_volume_3m
        data_type: double
        description: "average trading volume of the stock over the last 3 months"


      - name: insider_ownership
        data_type: double
        description: "percentage of outstanding shares held by company insiders (e.g. executives, founders)"


      - name: institution_ownership
        data_type: double
        description: "percentage of outstanding shares held by institutional investors (e.g. mutual funds, pension funds)"

      - name: foreign_ownership
        data_type: double
        description: "percentage of outstanding shares held by foreign investors"
      
      - name: staging_invocation_id
        data_type: varchar
        description: "staging invocation id generated by dbt for each run, used for tracking and debugging"
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:    
                value: 1
          

      - name: staged_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was staged"
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32

      - name: bronze_ingested_time
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was inserted into the bronze layer"
        data_tests:
          - not_null


  - name: staging_fundamental_2
    description: "staging layer for fundamental data (exchange, listing status,..), renaming column names, trimming white spaces and changing data types. It prepares the data for the silver layer."
    data_tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 1000
          max_value: 2000
      - dbt_expectations.expect_table_columns_to_contain_set:
          column_list: ["staging_invocation_id", "staged_at", "bronze_ingested_time"]


    columns:
      - name: bronze_ingested_time
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was inserted into the bronze layer"
        data_tests:
          - not_null

      - name: staged_at
        data_type: timestamp(6) with time zone
        description: "timestamp when the data was staged"
        data_tests:
          - not_null
          - dbt_expectations.expect_row_values_to_have_recent_data:
              arguments:
                datepart: day
                interval: 32

      - name: staging_invocation_id
        data_type: varchar
        description: "staging invocation id generated by dbt for each run, used for tracking and debugging"
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_count_to_equal:
              arguments:    
                value: 1

      - name: ticker
        data_type: varchar
        description: "ticker symbol of the company, e.g. VIC, FPT, etc."

      - name: exchange
        data_type: varchar
        description: "stock exchange where the company is listed"

      - name: is_listing
        data_type: boolean
        description: "indicates whether the company is currently listed on stock exchanges"


      